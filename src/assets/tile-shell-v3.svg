<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420" viewBox="0 0 300 420" preserveAspectRatio="none">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f9f6f1"/>
      <stop offset="100%" stop-color="#f3ede5"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#c49a32"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Gold border outer ring - no shadow -->
  <rect x="0" y="0" width="300" height="420" rx="20" ry="20"
    fill="url(#goldGrad)"/>
  <!-- White inner card -->
  <rect x="3" y="3" width="294" height="414" rx="18" ry="18"
    fill="url(#cardGrad)"/>
  <!-- Subtle top shine -->
  <rect x="30" y="4" width="240" height="2" rx="1"
    fill="url(#topShine)"/>
</svg>
