[build]
  command = "npm run build"
  publish = "dist"

# Domain primary (www/non-www) redirects are handled by the hosting layer.
# Do NOT add hardcoded www<->apex redirects here — they cause ERR_TOO_MANY_REDIRECTS.



[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

